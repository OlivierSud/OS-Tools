<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>🎞️ Convertir une vidéo en GIF</title>
  <link rel="stylesheet" href="../style-os.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      background: var(--bg-main);
      max-width: 1200px;
      margin: 0 auto;
    }

    h2 {
      flex-shrink: 0;
      margin: 0;
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.05em;
      text-align: center;
    }

    .tool-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      overflow: hidden;
    }

    .scroll-content {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 4px 12px 24px 12px;
    }

    video {
      width: 100%;
      max-width: 800px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--panel-border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      background: #000;
      flex-shrink: 0;
    }

    .slider-container {
      width: 100%;
      max-width: 800px;
      height: 32px;
      position: relative;
      margin: 10px 0;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      flex-shrink: 0;
    }

    .slider-range {
      position: absolute;
      left: 10px;
      right: 10px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .slider-highlight {
      position: absolute;
      height: 6px;
      background: var(--accent-gradient);
      border-radius: 3px;
      z-index: 1;
      box-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
    }

    .thumb {
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      position: absolute;
      z-index: 2;
      cursor: grab;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      transition: transform 0.1s ease;
    }

    .thumb:active {
      cursor: grabbing;
      transform: scale(1.2);
    }

    .time-labels {
      width: 100%;
      max-width: 800px;
      display: flex;
      justify-content: space-between;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: -10px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
      max-width: 800px;
      padding: 24px;
      margin-top: 10px;
    }

    .option-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .option-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .checkbox-label {
      flex-direction: row !important;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-transform: none !important;
      letter-spacing: normal !important;
      color: var(--text-primary) !important;
    }

    input[type="number"],
    select {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text-primary);
      padding: 10px 14px;
      outline: none;
    }

    .actions {
      display: flex;
      gap: 16px;
      margin-top: 10px;
    }

    #gif-container {
      width: 100%;
      text-align: center;
      margin-top: 40px;
    }

    #gif-container img {
      max-width: 100%;
      border-radius: var(--radius-md);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--panel-border);
    }
  </style>
</head>

<body>
  <div class="tool-container">
    <h2>🎞️ Vidéo vers GIF</h2>

    <div class="thumb" id="thumbEnd"></div>
  </div>

  <div class="time-labels">
    <span><span id="startTime">0.0</span> s</span>
    <span><span id="endTime">0.0</span> s</span>
  </div>

  <div class="options-grid">
    <div class="option-group">
      <label class="checkbox-label"><input type="checkbox" id="loop" checked> Boucle</label>
      <label class="checkbox-label"><input type="checkbox" id="reverse"> Inverser</label>
      <label class="checkbox-label"><input type="checkbox" id="useOriginal" checked> Original</label>
    </div>
    <div class="option-group">
      <label>Largeur (px)</label>
      <input type="number" id="width" value="320">
    </div>
    <div class="option-group">
      <label>Hauteur (px)</label>
      <input type="number" id="height" value="180">
    </div>
    <div class="option-group">
      <label>Couleurs</label>
      <input type="number" id="colors" value="256" min="2" max="256">
    </div>
  </div>

  <div class="actions">
    <button class="os-button" id="generateBtn" style="flex: 2;">⚡ Générer le GIF</button>
    <button class="os-button secondary" id="exportBtn" style="flex: 1;">💾 Exporter</button>
  </div>

  <div id="gif-size" style="margin-top: 16px; color: var(--text-secondary); font-size: 0.9rem;"></div>
  </div>

  <div id="gif-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

  <script>
    const video = document.getElementById('video');
    const input = document.getElementById('videoInput');
    const highlight = document.getElementById('highlight');
    const thumbStart = document.getElementById('thumbStart');
    const thumbEnd = document.getElementById('thumbEnd');
    const startLabel = document.getElementById('startTime');
    const endLabel = document.getElementById('endTime');
    const generateBtn = document.getElementById('generateBtn');
    const exportBtn = document.getElementById('exportBtn');
    const container = document.getElementById('gif-container');
    const loopCb = document.getElementById('loop');
    const reverseCb = document.getElementById('reverse');
    const useOriginalCb = document.getElementById('useOriginal');
    const widthInput = document.getElementById('width');
    const heightInput = document.getElementById('height');
    const colorsInput = document.getElementById('colors');
    const frameDurationInput = document.getElementById('frameDuration');
    const gifSize = document.getElementById('gif-size');
    const sliderContainer = document.getElementById('sliderContainer');

    let duration = 0;
    let workerURL = null;
    let generatedBlob = null;
    let videoFilename = "video";

    // Worker
    fetch("https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.worker.js")
      .then(r => r.text())
      .then(code => {
        const blob = new Blob([code], { type: "application/javascript" });
        workerURL = URL.createObjectURL(blob);
      });

    input.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      videoFilename = file.name.split('.').slice(0, -1).join('.') || "video";
      video.src = URL.createObjectURL(file);
      video.load();
      exportBtn.style.display = "none";
      container.innerHTML = "";
      gifSize.textContent = "";
    });

    video.addEventListener('loadedmetadata', () => {
      duration = video.duration;
      thumbStart.style.left = "0%";
      thumbEnd.style.left = "100%";
      updateHighlight();
      updateLabels();
    });

    function updateHighlight() {
      const start = parseFloat(thumbStart.dataset.time || 0);
      const end = parseFloat(thumbEnd.dataset.time || duration);
      const startPercent = (start / duration * 100);
      const endPercent = (end / duration * 100);
      highlight.style.left = startPercent + "%";
      highlight.style.width = (endPercent - startPercent) + "%";
    }

    function updateLabels() {
      startLabel.textContent = (parseFloat(thumbStart.dataset.time || 0)).toFixed(1);
      endLabel.textContent = (parseFloat(thumbEnd.dataset.time || duration)).toFixed(1);
    }

    function dragThumb(thumb) {
      const onMouseMove = (e) => {
        const rect = sliderContainer.getBoundingClientRect();
        let percent = ((e.clientX - rect.left) / rect.width * 100);
        percent = Math.max(0, Math.min(100, percent));
        const time = duration * percent / 100;
        if (thumb === thumbStart) {
          const endTime = parseFloat(thumbEnd.dataset.time || duration);
          if (time >= endTime) return;
          thumb.dataset.time = time;
        } else {
          const startTime = parseFloat(thumbStart.dataset.time || 0);
          if (time <= startTime) return;
          thumb.dataset.time = time;
        }
        thumb.style.left = percent + "%";
        updateHighlight();
        updateLabels();
      };
      const onMouseUp = () => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup', onMouseUp);
      };
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }

    thumbStart.addEventListener('mousedown', e => dragThumb(thumbStart));
    thumbEnd.addEventListener('mousedown', e => dragThumb(thumbEnd));

    generateBtn.addEventListener('click', async () => {
      if (!workerURL) { alert("Worker non prêt."); return; }
      const start = parseFloat(thumbStart.dataset.time || 0);
      const end = parseFloat(thumbEnd.dataset.time || duration);
      const frameDuration = parseInt(frameDurationInput.value) || 100;
      const step = frameDuration / 1000; // en secondes
      const width = useOriginalCb.checked ? video.videoWidth : +widthInput.value;
      const height = useOriginalCb.checked ? video.videoHeight : +heightInput.value;
      const colors = +colorsInput.value;
      const shouldReverse = reverseCb.checked;
      const shouldLoop = loopCb.checked;

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      const gif = new GIF({
        workers: 2,
        quality: 10,
        workerScript: workerURL,
        width, height,
        repeat: shouldLoop ? 0 : -1,
        colors: colors
      });

      container.innerHTML = "⏳ Génération du GIF...";
      gifSize.textContent = "";
      exportBtn.style.display = "none";

      let times = [];
      for (let t = start; t < end; t += step) times.push(t);
      if (shouldReverse) times.reverse();

      for (let t of times) {
        await new Promise(r => {
          video.currentTime = t;
          video.onseeked = () => {
            ctx.drawImage(video, 0, 0, width, height);
            gif.addFrame(ctx, { delay: frameDuration, copy: true });
            r();
          };
        });
      }

      gif.on('finished', blob => {
        generatedBlob = blob;
        const img = document.createElement('img');
        img.src = URL.createObjectURL(blob);
        container.innerHTML = "";
        container.appendChild(img);
        exportBtn.style.display = "inline-block";
        gifSize.textContent = `Poids : ${(blob.size / 1024 / 1024).toFixed(2)} Mo`;
      });

      gif.render();
    });

    exportBtn.addEventListener('click', () => {
      if (!generatedBlob) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(generatedBlob);
      a.download = `${videoFilename}.gif`;
      a.click();
    });
  </script>
</body>

</html>
