<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargement Logiciels - OS-Tools</title>
    <link rel="stylesheet" href="../style-os.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 48px 24px;
            gap: 32px;
            background: var(--bg-main);
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            flex-shrink: 0;
            text-align: center;
            margin: 0;
            font-size: 2rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .tools-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .tool-item {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-md);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            backdrop-filter: blur(20px);
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .tool-item:hover {
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
        }

        .tool-info h2 {
            margin: 0 0 8px 0;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .tool-info p {
            margin: 0;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .tool-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .os-button {
            flex: 1;
            min-width: 160px;
            text-decoration: none;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 600px) {
            .tool-actions {
                flex-direction: column;
            }

            .os-button {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <h1>Logiciels Standalone</h1>

    <div class="tools-list">
        <div class="tool-item">
            <div class="tool-info">
                <h2>OS Texture Cleaner</h2>
                <p>Un outil puissant pour analyser et nettoyer automatiquement les textures inutilisées dans vos projets
                    3D. Optimisez votre stockage en un clic.</p>
            </div>
            <div class="tool-actions">
                <a href="https://github.com/OlivierSud/OS-project-texture-cleaner/blob/main/Outils%20local/Texture-cleaner/dist/Project-texture-cleaner.exe"
                    class="os-button" target="_blank">📥 Télécharger .exe</a>
                <a href="https://github.com/OlivierSud/OS-project-texture-cleaner" class="os-button secondary"
                    target="_blank">🐱 GitHub</a>
                <a href="https://oliviersud.github.io/OS-project-texture-cleaner/" class="os-button secondary"
                    target="_blank">ℹ️ Présentation</a>
            </div>
        </div>
    </div>
</body>

</html>
