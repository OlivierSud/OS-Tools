<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Créateur de vidéo : images → MP4 (H.265 si disponible)</title>
  <link rel="stylesheet" href="../style-os.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 24px;
      gap: 20px;
      background: var(--bg-main);
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-section {
      flex-shrink: 0;
      text-align: center;
    }

    .header-section h1 {
      font-size: 2rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
      letter-spacing: -0.05em;
    }

    .header-section p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .tool-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    .scroll-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 8px;
    }

    .os-panel {
      padding: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 800px) {
      .os-panel {
        grid-template-columns: 1fr;
      }
    }

    .controls-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .control-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-row label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="number"],
    input[type="text"] {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--accent-cyan);
      background: rgba(15, 23, 42, 0.8);
      outline: none;
    }

    .output-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    canvas {
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: var(--radius-sm);
      border: 1px solid var(--panel-border);
      object-fit: contain;
    }

    .player-controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .player-controls .os-button {
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    .timeline-container {
      width: 100%;
      margin: 10px 0;
    }

    .log-panel {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      font-family: monospace;
      font-size: 0.85rem;
      max-height: 150px;
      overflow-y: auto;
      color: var(--text-secondary);
    }

    .pill {
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--accent-cyan);
      font-weight: 600;
    }

    .status-badge {
      font-size: 0.85rem;
      color: var(--accent-purple);
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="tool-container">
    <div class="header-section">
      <h1>Timelapse en MP4</h1>
      <p>Transformez un dossier d'images en vidéo haute résolution.</p>
    </div>

    <button id="export" class="os-button" style="margin-top: 12px;">💾 Exporter la vidéo</button>
  </div>

  <div class="preview-section">
    <canvas id="canvas"></canvas>
    <div class="timeline-container">
      <input id="timeline" type="range" min="0" max="100" value="0" style="width: 100%;">
    </div>
    <div class="player-controls">
      <button id="play" class="os-button secondary">▶️ Lire</button>
      <button id="stop" class="os-button secondary">⏹️ Stop</button>
      <button id="restart" class="os-button secondary">⏮️</button>
      <div id="status" class="status-badge" style="margin-left: auto;"></div>
    </div>
    <div id="codecInfo" class="pill" style="text-align: center;">Codec auto-détecté : H.265 / MP4</div>
  </div>
  </div>

  <div class="log-panel" id="log"></div>
  </div>

  <script>
    (() => {
      const $ = id => document.getElementById(id);
      const picker = $('picker'), fpsRange = $('fps'),
        est = $('est'), count = $('count'), canvas = $('canvas'),
        playBtn = $('play'), stopBtn = $('stop'), restartBtn = $('restart'),
        exportBtn = $('export'), timeline = $('timeline'),
        logEl = $('log'), statusEl = $('status'), codecInfo = $('codecInfo'),
        widthInput = $('widthInput'), heightInput = $('heightInput'),
        filenameInput = $('filename'), fpsVal = $('fpsVal');
      const ctx = canvas.getContext('2d');

      let frames = [], playing = false, previewTimer = null, frameIndex = 0;

      function log(msg, cls = '') {
        let d = document.createElement('div');
        if (cls) d.style.color = cls === 'ok' ? 'var(--accent-cyan)' : cls === 'bad' ? '#ef4444' : '#f59e0b';
        d.textContent = `> ${msg}`;
        logEl.appendChild(d);
        logEl.scrollTop = logEl.scrollHeight;
      }
      function fmtDur(t) { return `${Math.floor(t / 60)}:${String(Math.round(t % 60)).padStart(2, '0')}`; }

      async function loadImages(fileList) {
        frames = []; frameIndex = 0;
        const files = Array.from(fileList).filter(f => f.type.startsWith('image/'))
          .sort((a, b) => a.webkitRelativePath.localeCompare(b.webkitRelativePath) || a.name.localeCompare(b.name));
        count.textContent = `${files.length} image${files.length > 1 ? 's' : ''}`;
        if (!files.length) { log('Aucune image détectée.', 'warn'); return; }
        log(`Chargement de ${files.length} image(s)...`);
        for (const f of files) { try { let bmp = await createImageBitmap(f); frames.push({ bmp, w: bmp.width, h: bmp.height, name: f.name }); } catch (e) { log(`Échec ${f.name}`, 'bad'); } }
        if (frames.length) {
          const { w, h, name } = frames[0];
          widthInput.value = w; heightInput.value = h;
          canvas.width = w; canvas.height = h;
          filenameInput.value = name.replace(/\.[^.]+$/, '');
          drawFrame(0); updateEst();
          timeline.max = frames.length - 1; timeline.value = 0;
          log('Images prêtes ✔', 'ok');
        }
      }

      function drawFrame(i) {
        if (!frames.length) return;
        frameIndex = i % frames.length;
        const { bmp } = frames[frameIndex];
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bmp, 0, 0, canvas.width, canvas.height);
        timeline.value = frameIndex;
      }

      function updateCanvasSize() {
        canvas.width = parseInt(widthInput.value) || canvas.width;
        canvas.height = parseInt(heightInput.value) || canvas.height;
        drawFrame(frameIndex);
      }
      function updateEst() {
        let fps = +fpsRange.value;
        fpsVal.textContent = fps;
        let total = frames.length / (fps || 1);
        est.textContent = frames.length ? `${fmtDur(total)} (${frames.length} img)` : '—';
      }

      async function exportVideo() {
        if (!frames.length) return log('Aucune image à exporter.', 'warn');
        stopPreview();
        exportBtn.disabled = true;
        const fps = +fpsRange.value, stream = canvas.captureStream(fps), mime = pickBestMime();
        if (!mime) { log('Export vidéo non supporté', 'bad'); exportBtn.disabled = false; return; }
        codecInfo.textContent = `Codec : ${mime}`;
        const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 8000000 });
        const chunks = []; rec.ondataavailable = e => e.data.size && chunks.push(e.data);
        let i = 0, drawInterval = setInterval(() => { drawFrame(i++); if (i >= frames.length) { clearInterval(drawInterval); rec.stop(); } }, 1000 / fps);
        rec.onstop = () => {
          let blob = new Blob(chunks, { type: mime }), url = URL.createObjectURL(blob),
            ext = mime.includes('mp4') ? 'mp4' : 'webm', a = document.createElement('a');
          a.href = url; a.download = (filenameInput.value || 'export') + '.' + ext; a.click();
          URL.revokeObjectURL(url); log('Export terminé ✔', 'ok'); statusEl.textContent = ''; exportBtn.disabled = false;
        };
        rec.start(); statusEl.textContent = 'ENCODAGE...';
      }

      function pickBestMime() { return ['video/mp4;codecs=hvc1', 'video/mp4;codecs=hev1', 'video/mp4;codecs=avc1.42E01E', 'video/webm;codecs=vp9', 'video/webm;codecs=vp8'].find(m => MediaRecorder.isTypeSupported(m)) || ''; }
      function startPreview() { if (!frames.length || playing) return; playing = true; statusEl.textContent = 'LECTURE'; previewTimer = setInterval(() => drawFrame(frameIndex + 1), 1000 / (+fpsRange.value || 24)); playBtn.textContent = '⏸️ Pause'; }
      function stopPreview() { playing = false; clearInterval(previewTimer); previewTimer = null; playBtn.textContent = '▶️ Lire'; statusEl.textContent = ''; }
      function togglePreview() { playing ? stopPreview() : startPreview(); }
      function restartPreview() { frameIndex = 0; drawFrame(0); if (!playing) statusEl.textContent = ''; }

      picker.addEventListener('change', e => loadImages(e.target.files));
      fpsRange.addEventListener('input', e => updateEst());
      widthInput.addEventListener('input', updateCanvasSize);
      heightInput.addEventListener('input', updateCanvasSize);
      playBtn.addEventListener('click', togglePreview);
      stopBtn.addEventListener('click', stopPreview);
      restartBtn.addEventListener('click', restartPreview);
      exportBtn.addEventListener('click', exportVideo);
      timeline.addEventListener('input', e => drawFrame(+e.target.value));
    })();
  </script>
</body>
</body>

</html>
