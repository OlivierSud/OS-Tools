<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <title>Outils - Olivier Sudermann</title>
  <link rel="stylesheet" href="style-os.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #sidebar {
      width: 320px;
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--panel-border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .sidebar-header h2 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.025em;
    }

    #refresh {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--panel-border);
      color: var(--text-primary);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #refresh:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: rotate(180deg);
    }

    #list {
      list-style: none;
      padding: 16px;
      margin: 0;
      flex: 1;
      overflow-y: auto;
    }

    .folder {
      margin-bottom: 8px;
    }

    .folder-header {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      border-radius: 12px;
      transition: background 0.2s ease;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .folder-header::before {
      content: '▹';
      margin-right: 8px;
      transition: transform 0.2s ease;
    }

    .folder.open .folder-header::before {
      transform: rotate(90deg);
    }

    .folder-content {
      padding-left: 12px;
      margin-top: 4px;
      display: none;
    }

    .folder.open .folder-content {
      display: block;
    }

    .tool-item {
      margin: 2px 0;
    }

    .tool-link {
      display: block;
      padding: 10px 14px;
      color: var(--text-secondary);
      text-decoration: none;
      border-radius: 10px;
      font-size: 0.95rem;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .tool-link:hover {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-primary);
    }

    .tool-link.active {
      background: var(--accent-gradient);
      color: white;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(34, 211, 238, 0.3);
      border-color: rgba(255, 255, 255, 0.1);
    }

    #content {
      flex: 1;
      position: relative;
      background: #020617;
    }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      background-image:
        radial-gradient(circle at center, rgba(34, 211, 238, 0.03) 0%, transparent 70%);
    }

    #placeholder h3 {
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
    }
  </style>
</head>

<body>
  <div id="sidebar">
    <div class="sidebar-header">
      <h2>OS-TOOLS</h2>
      <button id="refresh" title="Actualiser">⟳</button>
    </div>
    <ul id="list"></ul>
  </div>

  <div id="content">
    <div id="placeholder">
      <div class="os-panel" style="text-align: center; max-width: 400px;">
        <h3
          style="background: var(--accent-gradient-purple); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          Bienvenue</h3>
        <p>Sélectionnez un outil dans le menu latéral pour commencer.</p>
      </div>
    </div>
    <iframe id="viewer"></iframe>
  </div>

  <script>
    const list = document.getElementById('list');
    const viewer = document.getElementById('viewer');
    const placeholder = document.getElementById('placeholder');
    const refreshBtn = document.getElementById('refresh');

    let folders = {};
    let tools = [];

    // Fonction pour organiser automatiquement les outils par arborescence
    function organizeToolsByStructure(tools) {
      // Réinitialiser les dossiers existants
      folders = {};

      tools.forEach(tool => {
        // Extraire le préfixe de catégorie (ex: "2D", "3D", "Video")
        const category = extractCategory(tool.name);

        if (category) {
          // Créer le dossier s'il n'existe pas
          if (!folders[category]) {
            folders[category] = {
              name: category,
              tools: []
            };
          }

          // Ajouter l'outil au dossier
          folders[category].tools.push(tool.name);
        }
      });
    }

    // Fonction pour extraire la catégorie d'un nom d'outil
    function extractCategory(toolName) {
      // Nouveau format : on prend le préfixe avant le premier tiret
      const match = toolName.match(/^([^-]+)-/);
      if (match) {
        // Nettoyage d'éventuels espaces ou majuscules
        return match[1].trim().replace(/^[a-z]/, c => c.toUpperCase());
      }
      return null;
    }

    // Fonction pour scanner automatiquement le dossier Outils
    async function scanOutilsFolder() {
      try {
        // Utiliser l'API File System Access si disponible
        if ('showDirectoryPicker' in window) {
          const dirHandle = await window.showDirectoryPicker({
            startIn: 'Outils'
          });
          const files = [];

          for await (const entry of dirHandle.values()) {
            if (entry.kind === 'file' && entry.name.endsWith('.html')) {
              const file = await entry.getFile();
              files.push(file);
            }
          }

          tools = files;
          organizeToolsByStructure(tools);
          renderList();
        } else {
          // Fallback pour les navigateurs qui ne supportent pas l'API File System Access
          const staticFiles = [
            { name: '2D-GIF-creator.html', path: './Outils/2D-GIF-creator.html' },
            { name: '2D-video-to-GIF.html', path: './Outils/2D-video-to-GIF.html' },
            { name: '2D-Sprite-sheet-cutter.html', path: './Outils/2D-Sprite-sheet-cutter.html' },
            { name: '2D-Remove-color-as-alpha.html', path: './Outils/2D-Remove-color-as-alpha.html' },
            { name: '2D-color-replacement.html', path: './Outils/2D-color-replacement.html' },
            { name: '2D-Color-format-convert.html', path: './Outils/2D-Color-format-convert.html' },
            { name: '2D-Image-to-vector.html', path: './Outils/2D-Image-to-vector.html' },
            { name: 'Soft-download-link.html', path: './Outils/Soft-download-link.html' },
            { name: '3D-normal-map-generator.html', path: './Outils/3D-normal-map-generator.html' },
            { name: '3D-Json-to-OBJ/STL.html', path: './Outils/3D-Json-to-OBJ-STL.html' },
            { name: '3D-Json-to-GLB.html', path: './Outils/3D-Json-to-GLB.html' },
            { name: 'Video-Timelaps-to-MP4.html', path: './Outils/Video-Timelaps-to-MP4.html' }
          ];

          tools = staticFiles;
          organizeToolsByStructure(tools);
          renderList();
        }
      } catch (error) {
        // console.error('Erreur lors du scan du dossier:', error);
        // En cas d'erreur, utiliser la liste statique
        const staticFiles = [
          { name: '2D-GIF-creator.html', path: './Outils/2D-GIF-creator.html' },
          { name: '2D-video-to-GIF.html', path: './Outils/2D-video-to-GIF.html' },
          { name: '2D-Sprite-sheet-cutter.html', path: './Outils/2D-Sprite-sheet-cutter.html' },
          { name: '2D-Remove-color-as-alpha.html', path: './Outils/2D-Remove-color-as-alpha.html' },
          { name: '2D-color-replacement.html', path: './Outils/2D-color-replacement.html' },
          { name: '2D-Color-format-convert.html', path: './Outils/2D-Color-format-convert.html' },
          { name: '2D-Image-to-vector.html', path: './Outils/2D-Image-to-vector.html' },
          { name: 'Soft-download-link.html', path: './Outils/Soft-download-link.html' },
          { name: '3D-normal-map-generator.html', path: './Outils/3D-normal-map-generator.html' },
          { name: '3D-Json-to-OBJ/STL.html', path: './Outils/3D-Json-to-OBJ-STL.html' },
          { name: '3D-Json-to-GLB.html', path: './Outils/3D-Json-to-GLB.html' },
          { name: 'Video-Timelaps-to-MP4.html', path: './Outils/Video-Timelaps-to-MP4.html' }
        ];

        tools = staticFiles;
        organizeToolsByStructure(tools);
        renderList();
      }
    }

    // Fonction pour rendre la liste
    function renderList() {
      list.innerHTML = '';

      // Rendre les dossiers
      Object.keys(folders).forEach(folderId => {
        const folder = folders[folderId];
        const li = document.createElement('li');
        li.className = 'folder open'; // Open by default

        const folderHeader = document.createElement('div');
        folderHeader.className = 'folder-header';

        const folderName = document.createElement('span');
        folderName.className = 'folder-name';
        folderName.textContent = folder.name;

        folderHeader.appendChild(folderName);
        folderHeader.onclick = () => li.classList.toggle('open');

        const folderContent = document.createElement('div');
        folderContent.className = 'folder-content';

        // Ajouter les outils du dossier
        folder.tools.forEach(toolName => {
          const tool = tools.find(t => t.name === toolName);
          if (tool) {
            const toolLi = createToolElement(tool);
            folderContent.appendChild(toolLi);
          }
        });

        li.appendChild(folderHeader);
        li.appendChild(folderContent);
        list.appendChild(li);
      });

      // Rendre les outils non classés
      const unassignedTools = tools.filter(tool => {
        return !Object.values(folders).some(folder =>
          folder.tools.includes(tool.name)
        );
      });

      if (unassignedTools.length > 0) {
        const unassignedHeader = document.createElement('li');
        unassignedHeader.innerHTML = '<div class="folder-header">Autres Outils</div>';
        const unassignedContent = document.createElement('div');
        unassignedContent.className = 'folder-content';
        unassignedContent.style.display = 'block';

        unassignedTools.forEach(tool => {
          const toolLi = createToolElement(tool);
          unassignedContent.appendChild(toolLi);
        });

        unassignedHeader.appendChild(unassignedContent);
        list.appendChild(unassignedHeader);
      }
    }

    // Fonction pour créer un élément outil
    function createToolElement(tool) {
      const li = document.createElement('li');
      li.className = 'tool-item';

      const a = document.createElement('a');
      a.className = 'tool-link';
      a.textContent = tool.name.replace(/\.html?$/i, '').replace(/^[^-]+-/, '');

      if (tool.path) {
        a.href = tool.path;
      } else {
        a.href = URL.createObjectURL(tool);
      }

      a.addEventListener('click', e => {
        e.preventDefault();
        list.querySelectorAll('.tool-link').forEach(l => l.classList.remove('active'));
        a.classList.add('active');
        viewer.src = a.href;
        viewer.style.display = 'block';
        placeholder.style.display = 'none';
      });

      li.appendChild(a);
      return li;
    }

    // Événements
    refreshBtn.addEventListener('click', () => {
      scanOutilsFolder();
    });

    // Scanner automatiquement au chargement de la page
    document.addEventListener('DOMContentLoaded', () => {
      scanOutilsFolder();
    });
  </script>
</body>

</html>
